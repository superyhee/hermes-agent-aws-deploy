AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Hermes Agent - Minimal Deployment (no Bedrock).
  Just Hermes Agent on a t3.medium with SSH access.

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 Key Pair for SSH access

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]

  SSHAllowCIDR:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$

Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-west-2:
      AMI: ami-03f65b8614a860c29
    eu-west-1:
      AMI: ami-0905a3c97561e0b69
    ap-southeast-1:
      AMI: ami-005c9e06a21d032e4
    ap-northeast-1:
      AMI: ami-07c589821f2b353aa

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Hermes Agent SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAllowCIDR
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/hermes-install.log 2>&1
          export DEBIAN_FRONTEND=noninteractive

          apt-get update -qq && apt-get upgrade -y -qq
          apt-get install -y -qq git curl build-essential python3-dev libffi-dev ripgrep ffmpeg
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y -qq nodejs

          sudo -u ubuntu bash << 'EOF'
          cd /home/ubuntu
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh \
            | bash -s -- --skip-setup
          EOF

          echo "Hermes Agent installed: $(date -u)"

Outputs:
  PublicIP:
    Value: !GetAtt Instance.PublicIp
  SSHCommand:
    Value: !Sub 'ssh ubuntu@${Instance.PublicIp}'
